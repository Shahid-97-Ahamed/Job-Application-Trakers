<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
    <!-- DaisyUI + Tailwind CSS links -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-50 min-h-screen font-sans p-6 md:p-12">
    <!-- Header Section Start -->
      <header class="max-w-6xl mx-auto mb-10">
        <h1 class="text-3xl font-bold text-[#001f3f] mb-8">Job Application Tracker</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <p class="text-gray-500 font-medium text-sm mb-2">Total</p>
                <h2 id="stat-total" class="text-4xl font-bold text-[#001f3f]">8</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <p class="text-gray-500 font-medium text-sm mb-2">Interview</p>
                <h2 id="stat-interview" class="text-4xl font-bold text-[#10b981]">0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <p class="text-gray-500 font-medium text-sm mb-2">Rejected</p>
                <h2 id="stat-rejected" class="text-4xl font-bold text-[#ef4444]">0</h2>
            </div>
        </div>
    </header>
    <!-- Header Section End -->
    <!-- Main Content Start -->
      <main class="max-w-6xl mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-[#001f3f]">Available Jobs</h2>
            <span class="text-gray-500 text-sm"><span id="job-count-label">8</span> jobs</span>
        </div>

        <div class="flex gap-2 mb-8">
            <button onclick="switchTab('all')" id="tab-all" class="px-6 py-2 rounded-md text-sm font-medium transition-colors bg-blue-600 text-white">All</button>
            <button onclick="switchTab('interview')" id="tab-interview" class="px-6 py-2 rounded-md text-sm font-medium transition-colors bg-white border text-gray-600 hover:bg-gray-50">Interview</button>
            <button onclick="switchTab('rejected')" id="tab-rejected" class="px-6 py-2 rounded-md text-sm font-medium transition-colors bg-white border text-gray-600 hover:bg-gray-50">Rejected</button>
        </div>

        <div id="job-list" class="space-y-4">
            </div>

        <div id="empty-state" class="hidden bg-white border border-gray-100 rounded-xl py-24 flex flex-col items-center justify-center text-center">
            <div class="bg-blue-100 p-4 rounded-xl mb-6">
                <img src="./jobs.png" alt="No jobs" class="w-16 h-16 opacity-80">
            </div>
            <h3 class="text-2xl font-bold text-[#001f3f] mb-2">No jobs available</h3>
            <p class="text-gray-500">Check back soon for new job opportunities</p>
        </div>
    </main>
</body>
<script src="scripts/index.js"></script>

</html>
