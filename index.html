<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
    <!-- DaisyUI + Tailwind CSS links -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-50 min-h-screen font-sans p-6 md:p-12">
    <!-- Header Section Start -->
      <header class="max-w-6xl mx-auto mb-10">
        <h1 class="text-3xl font-bold text-[#001f3f] mb-8">Job Application Tracker</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <p class="text-gray-500 font-medium text-sm mb-2">Total</p>
                <h2 id="stat-total" class="text-4xl font-bold text-[#001f3f]">8</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <p class="text-gray-500 font-medium text-sm mb-2">Interview</p>
                <h2 id="stat-interview" class="text-4xl font-bold text-[#10b981]">0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <p class="text-gray-500 font-medium text-sm mb-2">Rejected</p>
                <h2 id="stat-rejected" class="text-4xl font-bold text-[#ef4444]">0</h2>
            </div>
        </div>
    </header>
</body>
<script src="scripts/index.js"></script>

</html>
